<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starforge AI Narrative</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 60vh;
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      }
      #hud {
        padding: 8px 12px;
        background: #111827;
        border-bottom: 1px solid #1f2937;
        display: flex;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="player-stats"></div>
      <div id="scene-name"></div>
      <div id="quest-info"></div>
      <button id="toggle-ai" style="margin-left:auto;background:#2563eb;border:none;color:#e2e8f0;padding:4px 10px;border-radius:4px;cursor:pointer;">
        AI Mode: Mock
      </button>
    </div>
    <canvas id="game"></canvas>
    <div id="quest-list" style="padding:8px 12px;background:#111827;color:#e2e8f0;border-bottom:1px solid #1f2937;"></div>
    <div id="toast-container" style="position:fixed; right:16px; bottom:16px; width:240px; z-index:10;"></div>
    <div id="dev-panel" style="padding:8px 12px;background:#0b1220;color:#e2e8f0;border-top:1px solid #1f2937;">
      <label style="display:block;margin-bottom:4px;">Lore Search (backend /game/lore/search)</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="lore-input" type="text" placeholder="bullying safety" style="flex:1;padding:6px;border-radius:4px;border:1px solid #1f2937;background:#111827;color:#e2e8f0;" />
        <button id="lore-btn" style="background:#16a34a;border:none;color:#e2e8f0;padding:6px 12px;border-radius:4px;cursor:pointer;">Search</button>
        <button id="reset-btn" style="background:#dc2626;border:none;color:#e2e8f0;padding:6px 12px;border-radius:4px;cursor:pointer;">Reset</button>
      </div>
      <pre id="lore-results" style="margin-top:6px;white-space:pre-wrap;background:#0f172a;padding:8px;border-radius:4px;min-height:40px;"></pre>
      <label style="display:block;margin-top:8px;">Dev State (scene/npc/last AI)</label>
      <pre id="dev-state" style="margin-top:4px;white-space:pre-wrap;background:#0f172a;padding:8px;border-radius:4px;min-height:60px;"></pre>
      <label style="display:block;margin-top:8px;">Last Prompt / Trace</label>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button id="copy-prompt" style="background:#2563eb;border:none;color:#e2e8f0;padding:6px 10px;border-radius:4px;cursor:pointer;">Copy Prompt</button>
        <button id="copy-trace" style="background:#475569;border:none;color:#e2e8f0;padding:6px 10px;border-radius:4px;cursor:pointer;">Copy Trace</button>
        <button id="clear-log" style="background:#6b7280;border:none;color:#e2e8f0;padding:6px 10px;border-radius:4px;cursor:pointer;">Clear Log</button>
      </div>
      <pre id="prompt-trace" style="margin-top:4px;white-space:pre-wrap;background:#0f172a;padding:8px;border-radius:4px;min-height:60px;"></pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
